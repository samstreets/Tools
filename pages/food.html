<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Can't decide what to eat? Let the Food Generator help.">
    <meta property="og:title" content="Food Generator - Streets Services">
    <meta property="og:description" content="Random meal ideas for lunch, dinner, and meal deals.">
    <meta property="og:image" content="https://streetsservices.co.uk/pictures/icon.png">
    <meta property="og:url" content="https://streetsservices.co.uk/pages/food.html">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <title>Food Generator - Streets Services</title>
    <link rel="icon" type="image/png" href="../pictures/icon.png">
    <link rel="stylesheet" href="../styles.css">
    <style>
        .gen-card{background:var(--bg-card);border:1px solid var(--border);padding:28px;transition:background .2s;}
        .gen-card:hover{background:var(--bg-hover);}
        .gen-title{font-family:var(--font-display);font-size:20px;font-weight:700;color:var(--text);margin-bottom:16px;}
        .result-display{font-family:var(--font-display);font-size:24px;font-weight:700;color:var(--accent);min-height:40px;margin:16px 0;letter-spacing:-0.5px;}
        .btn-primary{padding:12px 24px;background:transparent;border:1px solid var(--accent);color:var(--accent);font-family:var(--font-mono);font-size:11px;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;transition:background .2s,color .2s;width:100%;}
        .btn-primary:hover{background:var(--accent);color:#0e0e0e;}
    </style>
    <link rel="canonical" href="https://streetsservices.co.uk/pages/food.html">
</head>
<body>
    <a href="#main" class="skip-link">Skip to content</a>

    <nav class="nav-bar" role="navigation" aria-label="Main navigation">
        <span class="nav-prompt">sam@streets:~$</span>
        <ul class="nav-links">
            <li><a href="../index.html">~/home</a></li>
            <li><a href="knowledge-base.html">~/kb</a></li>
            <li><a href="it-glossary.html">~/glossary</a></li>
            <li><a href="contact.html">~/contact</a></li>
        </ul>
        <span class="nav-right">IT HUB v2.0</span>
    </nav>

    <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="../index.html">home</a>
        <span class="sep" aria-hidden="true">/</span>
        <span>food</span>
    </nav>

    <header class="page-header">
        <p class="page-eyebrow">Fun</p>
        <h1>Food Generator</h1>
        <p>Can't decide what to eat? Let us help.</p>
    </header>

    <main id="main" class="content">

        <div class="section-block">
            <div class="block-header">
                <span class="block-num">01</span>
                <h2 class="block-title">Generators</h2>
                <span class="block-line" aria-hidden="true"></span>
            </div>

            <div class="card-grid" style="grid-template-columns:repeat(auto-fit,minmax(260px,1fr));">
                <div class="gen-card">
                    <p class="gen-title">🥪 Lunch Ideas</p>
                    <div id="lunch-result" class="result-display" role="status" aria-live="polite"></div>
                    <button class="btn-primary" onclick="generateLunch()">Generate Random Lunch</button>
                </div>
                <div class="gen-card">
                    <p class="gen-title">🍽️ Dinner Ideas</p>
                    <div id="dinner-result" class="result-display" role="status" aria-live="polite"></div>
                    <button class="btn-primary" onclick="generateDinner()">Generate Random Dinner</button>
                </div>
                <div class="gen-card">
                    <p class="gen-title">💰 Meal Deals</p>
                    <div id="meal-deal-result" class="result-display" role="status" aria-live="polite"></div>
                    <button class="btn-primary" onclick="generateMealDeal()">Generate Random Meal Deal</button>
                </div>
                <div class="gen-card">
                    <p class="gen-title">🍴 Go Out</p>
                    <div id="out-result" class="result-display" role="status" aria-live="polite"></div>
                    <button class="btn-primary" onclick="generateOut()">Pick a Restaurant</button>
                </div>
            </div>
        </div>

    </main>

    <footer class="site-footer">
        <p>&copy; 2026 Sam Streets. All rights reserved.</p>
        <a href="../index.html">← Back to Home</a>
    </footer>

    <script src="../app.js"></script>
    <script>
        const DEFAULT_FOOD_DATA = {
            lunch:    ['Wraps','Cheesy Wraps','Toast','Noodles','Pate on Toast','Sandwiches','Bacon Sandwiches','Warm Rolls','Beans on Toast','Fried Egg Sandwich','Go Out'],
            dinner:   ['Burgers','Pizza','Homemade Pizza','Korma','Butter Chicken','Spaghetti Bolognese','Chilli Con Carne','Cheesy Bacon Pasta','Honey Sesame Chicken','Chicken Nuggets & Chips','Lasagna','Pasta Bake','Meatloaf','Fish & Chips','Stuffed Garlic Baguettes','Go Out'],
            mealDeal: ['Sausage & Mash','Chicken Korma','Meatballs & Pasta'],
            out:      ['McDonald\'s','Subway','KFC','Nandos','Green King','Weatherspoon\'s'],
        };

        function getFoodData() {
            try { const s = localStorage.getItem('foodData'); return s ? JSON.parse(s) : DEFAULT_FOOD_DATA; }
            catch { return DEFAULT_FOOD_DATA; }
        }

        function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

        function show(id, val) {
            const el = document.getElementById(id);
            el.style.opacity = '0';
            setTimeout(() => { el.textContent = val; el.style.opacity = '1'; el.style.transition = 'opacity .3s'; }, 50);
        }

        function generateLunch()   { show('lunch-result',    pick(getFoodData().lunch)); }
        function generateDinner()  { show('dinner-result',   pick(getFoodData().dinner)); }
        function generateMealDeal(){ show('meal-deal-result', pick(getFoodData().mealDeal)); }
        function generateOut()     { show('out-result',       pick(getFoodData().out)); }
    </script>
</body>
</html>
